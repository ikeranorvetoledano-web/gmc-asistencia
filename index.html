<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GMC Asistencia</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:#f5f5f5;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1rem;}
:root{--gmc-red:#7E0002;--gmc-gray:#5B5B5B;}
.app{max-width:420px;width:100%;}
.header{display:flex;align-items:center;gap:12px;padding:1rem 1.25rem;background:var(--gmc-red);border-radius:12px;margin-bottom:1rem;}
.logo-box{width:52px;height:52px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.header-text h1{color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:0.5px;line-height:1.1;}
.header-text p{color:rgba(255,255,255,0.75);font-size:12px;margin-top:2px;}
.card{background:#fff;border:1px solid rgba(0,0,0,0.1);border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:1.25rem;}
.type-btn{padding:10px;border:2px solid rgba(0,0,0,0.15);border-radius:8px;background:transparent;cursor:pointer;font-family:'Barlow',sans-serif;font-size:14px;font-weight:500;color:#666;transition:all 0.15s;}
.type-btn.active{border-color:var(--gmc-red);background:var(--gmc-red);color:#fff;}
.field{margin-bottom:1rem;}
.field label{display:block;font-size:12px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px;}
.field input{width:100%;padding:10px 12px;border:1px solid rgba(0,0,0,0.2);border-radius:8px;font-family:'Barlow',sans-serif;font-size:15px;color:#111;background:#fff;}
.field input:focus{outline:none;border-color:var(--gmc-red);box-shadow:0 0 0 2px rgba(126,0,2,0.12);}
.status-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:8px;font-size:13px;font-weight:500;margin-bottom:1rem;}
.status-row.ok{background:#EAF3DE;color:#3B6D11;}
.status-row.error{background:#FCEBEB;color:#A32D2D;}
.status-row.pending{background:#F1EFE8;color:#5F5E5A;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot.ok{background:#639922;}
.dot.error{background:#E24B4A;}
.dot.pending{background:#888780;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.photo-area{border:2px dashed rgba(0,0,0,0.2);border-radius:10px;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;margin-bottom:1rem;cursor:pointer;position:relative;overflow:hidden;background:#f9f9f9;}
.photo-area video,.photo-area img{width:100%;height:160px;object-fit:cover;border-radius:8px;display:block;}
.photo-overlay{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:#888;}
.photo-overlay .icon{font-size:40px;}
.photo-overlay span{font-size:13px;}
.btn-main{width:100%;padding:13px;background:var(--gmc-red);color:#fff;border:none;border-radius:10px;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:1px;cursor:pointer;}
.btn-main:disabled{opacity:0.4;cursor:not-allowed;}
.btn-sec{width:100%;padding:10px;background:transparent;color:var(--gmc-red);border:1.5px solid var(--gmc-red);border-radius:8px;font-family:'Barlow',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;}
.note{font-size:11px;color:#888;text-align:center;margin-top:8px;}
.success-screen{text-align:center;padding:2rem 1rem;}
.check-circle{width:64px;height:64px;background:#EAF3DE;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:40px;color:#639922;}
.success-screen h2{font-family:'Barlow Condensed',sans-serif;font-size:24px;color:#111;margin-bottom:6px;}
.success-screen p{font-size:14px;color:#666;}
.hidden{display:none;}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo-box">
      <svg viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg" width="44">
        <rect x="2" y="2" width="116" height="56" rx="2" fill="none" stroke="#5B5B5B" stroke-width="4"/>
        <rect x="54" y="2" width="14" height="56" fill="#7E0002"/>
        <text x="8" y="48" font-family="Arial Black,sans-serif" font-size="50" font-weight="900" fill="#5B5B5B">G</text>
        <text x="42" y="48" font-family="Arial Black,sans-serif" font-size="50" font-weight="900" fill="#5B5B5B">M</text>
        <text x="78" y="48" font-family="Arial Black,sans-serif" font-size="50" font-weight="900" fill="#5B5B5B">C</text>
      </svg>
    </div>
    <div class="header-text">
      <h1>Grupo Mobarak Constructores</h1>
      <p>Sistema de asistencia · Obra Palmeiras</p>
    </div>
  </div>

  <div id="formScreen">
    <div class="card">
      <div class="type-toggle">
        <button class="type-btn active" id="btnEntrada" onclick="setTipo('ENTRADA')">&#8594; Entrada</button>
        <button class="type-btn" id="btnSalida" onclick="setTipo('SALIDA')">&#8592; Salida</button>
      </div>
      <div class="field">
        <label>Nombre completo</label>
        <input type="text" id="nombre" placeholder="Ej. Juan Pérez García" autocomplete="off" oninput="revisarHabilitado()"/>
      </div>
      <div id="gpsStatus" class="status-row pending">
        <div class="dot pending" id="gpsDot"></div>
        <span id="gpsText">Obteniendo ubicación GPS...</span>
      </div>
      <div class="photo-area" id="photoArea" onclick="areaClick()">
        <div class="photo-overlay" id="photoOverlay">
          <div class="icon">📷</div>
          <span>Toca aquí para activar la cámara</span>
        </div>
      </div>
      <button class="btn-sec hidden" id="snapBtn" onclick="tomarFoto()">📸 Tomar foto ahora</button>
      <button class="btn-sec hidden" id="retryBtn" onclick="reiniciarCamara()">🔄 Repetir foto</button>
    </div>
    <button class="btn-main" id="submitBtn" onclick="enviarRegistro()" disabled>REGISTRAR ASISTENCIA</button>
    <p class="note">Tu ubicación GPS y foto quedan registradas con nombre y hora.</p>
  </div>

  <div id="successScreen" class="card success-screen hidden">
    <div class="check-circle">✓</div>
    <h2 id="successTitle">¡Registro exitoso!</h2>
    <p id="successMsg"></p>
    <button class="btn-main" style="margin-top:1.5rem;" onclick="reiniciar()">NUEVO REGISTRO</button>
  </div>
</div>

<script>
const SHEETS_URL='https://script.google.com/macros/s/AKfycbwZHI7SLSEfYrM8BKXR9RfnUHGifCqOB9U0E7DHFkc5i2COjgV3MHm8PibL9m7anzlM/exec';
const OBRA_LAT=16.8089,OBRA_LNG=-99.8697,RADIO_M=150;
let gpsOk=false,fotoOk=false,coordsUser=null,fotoBase64=null,tipoRegistro='ENTRADA',stream=null,camaraActiva=false;

function setTipo(t){
  tipoRegistro=t;
  document.getElementById('btnEntrada').classList.toggle('active',t==='ENTRADA');
  document.getElementById('btnSalida').classList.toggle('active',t==='SALIDA');
}

function distanciaMetros(lat1,lng1,lat2,lng2){
  const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function iniciarGPS(){
  if(!navigator.geolocation){setGPS(false,'GPS no disponible');return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    coordsUser={lat:pos.coords.latitude,lng:pos.coords.longitude};
    const dist=distanciaMetros(coordsUser.lat,coordsUser.lng,OBRA_LAT,OBRA_LNG);
    dist<=RADIO_M?setGPS(true,'Ubicación verificada · estás en la obra'):setGPS(false,'Fuera de la obra ('+Math.round(dist)+' m de distancia)');
  },()=>setGPS(false,'No se pudo obtener ubicación. Activa el GPS.'),{enableHighAccuracy:true,timeout:12000});
}

function setGPS(ok,msg){
  gpsOk=ok;
  document.getElementById('gpsStatus').className='status-row '+(ok?'ok':'error');
  document.getElementById('gpsDot').className='dot '+(ok?'ok':'error');
  document.getElementById('gpsText').textContent=msg;
  revisarHabilitado();
}

function areaClick(){if(!camaraActiva&&!fotoOk)activarCamara();}

async function activarCamara(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
    const area=document.getElementById('photoArea');
    area.onclick=null;
    const video=document.createElement('video');
    video.autoplay=true;video.playsInline=true;video.srcObject=stream;
    video.style.cssText='width:100%;height:160px;object-fit:cover;border-radius:8px;display:block;';
    area.innerHTML='';area.appendChild(video);
    document.getElementById('snapBtn').classList.remove('hidden');
    camaraActiva=true;
  }catch(e){
    document.getElementById('photoArea').innerHTML='<div class="photo-overlay"><div class="icon">🚫</div><span>Cámara no disponible</span></div>';
  }
}

function tomarFoto(){
  const video=document.getElementById('photoArea').querySelector('video');
  if(!video)return;
  const canvas=document.createElement('canvas');
  canvas.width=video.videoWidth||320;canvas.height=video.videoHeight||240;
  canvas.getContext('2d').drawImage(video,0,0);
  fotoBase64=canvas.toDataURL('image/jpeg',0.7);
  if(stream)stream.getTracks().forEach(t=>t.stop());
  const area=document.getElementById('photoArea');
  const img=document.createElement('img');
  img.src=fotoBase64;img.style.cssText='width:100%;height:160px;object-fit:cover;border-radius:8px;display:block;';
  area.innerHTML='';area.appendChild(img);
  document.getElementById('snapBtn').classList.add('hidden');
  document.getElementById('retryBtn').classList.remove('hidden');
  fotoOk=true;camaraActiva=false;revisarHabilitado();
}

function reiniciarCamara(){
  fotoBase64=null;fotoOk=false;camaraActiva=false;
  const area=document.getElementById('photoArea');
  area.innerHTML='<div class="photo-overlay" id="photoOverlay"><div class="icon">📷</div><span>Toca aquí para activar la cámara</span></div>';
  area.onclick=areaClick;
  document.getElementById('retryBtn').classList.add('hidden');
  document.getElementById('snapBtn').classList.add('hidden');
  revisarHabilitado();
}

function revisarHabilitado(){
  const nombre=document.getElementById('nombre').value.trim();
  document.getElementById('submitBtn').disabled=!(nombre.length>2&&gpsOk&&fotoOk);
}

function enviarRegistro(){
  const nombre=document.getElementById('nombre').value.trim();
  const hora=new Date().toLocaleString('es-MX',{timeZone:'America/Mexico_City'});
  const btn=document.getElementById('submitBtn');
  btn.disabled=true;btn.textContent='ENVIANDO...';
  fetch(SHEETS_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({nombre,tipo:tipoRegistro,hora,lat:coordsUser?coordsUser.lat:'',lng:coordsUser?coordsUser.lng:'',foto:fotoBase64||''})}).catch(()=>{});
  document.getElementById('formScreen').classList.add('hidden');
  document.getElementById('successScreen').classList.remove('hidden');
  document.getElementById('successTitle').textContent=tipoRegistro==='ENTRADA'?'¡Entrada registrada!':'¡Salida registrada!';
  document.getElementById('successMsg').textContent=nombre+' · '+hora;
}

function reiniciar(){
  tipoRegistro='ENTRADA';
  document.getElementById('btnEntrada').classList.add('active');
  document.getElementById('btnSalida').classList.remove('active');
  document.getElementById('nombre').value='';
  fotoOk=false;fotoBase64=null;camaraActiva=false;gpsOk=false;coordsUser=null;
  const area=document.getElementById('photoArea');
  area.innerHTML='<div class="photo-overlay" id="photoOverlay"><div class="icon">📷</div><span>Toca aquí para activar la cámara</span></div>';
  area.onclick=areaClick;
  document.getElementById('snapBtn').classList.add('hidden');
  document.getElementById('retryBtn').classList.add('hidden');
  document.getElementById('submitBtn').disabled=true;
  document.getElementById('submitBtn').textContent='REGISTRAR ASISTENCIA';
  document.getElementById('gpsStatus').className='status-row pending';
  document.getElementById('gpsDot').className='dot pending';
  document.getElementById('gpsText').textContent='Obteniendo ubicación GPS...';
  document.getElementById('formScreen').classList.remove('hidden');
  document.getElementById('successScreen').classList.add('hidden');
  iniciarGPS();
}

iniciarGPS();
</script>
</body>
</html>
